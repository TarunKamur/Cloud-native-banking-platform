apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: paisa-bank-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

spec:
  ingressClassName: {{ .Values.ingress.className }}

{{- if .Values.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.frontend.host }}
    - {{ .Values.backend.host }}
    secretName: {{ .Values.tls.secretName }}
{{- end }}

  rules:
  - host: {{ .Values.frontend.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.frontend.serviceName }}
            port:
              number: {{ .Values.frontend.servicePort }}

  - host: {{ .Values.backend.host }}
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ .Values.backend.serviceName }}
            port:
              number: {{ .Values.backend.servicePort }}
