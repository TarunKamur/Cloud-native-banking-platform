apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb

spec:
  serviceName: mongodb-svc
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}

      containers:
      - name: mongodb
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        ports:
        - containerPort: 27017

        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db

  volumeClaimTemplates:
  - metadata:
      name: mongodb-data

    spec:
      accessModes:
      - ReadWriteOnce

      resources:
        requests:
          storage: {{ .Values.storage.size }}
