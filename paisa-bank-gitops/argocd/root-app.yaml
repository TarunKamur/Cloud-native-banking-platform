apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: paisa-bank
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/TarunKamur/Cloud-native-banking-platform.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
